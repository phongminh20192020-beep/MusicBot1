<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MusicBot // Console</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<canvas id="bg-canvas" aria-hidden="true"></canvas>
<div class="aurora" aria-hidden="true">
  <span class="aurora-blob aurora-a"></span>
  <span class="aurora-blob aurora-b"></span>
  <span class="aurora-blob aurora-c"></span>
</div>
<div class="grain" aria-hidden="true"></div>

<!-- ─── Toasts ─────────────────────────────────────────────────────────── -->
<div id="toast-stack" class="toast-stack" aria-live="polite"></div>

<!-- ─── Confirm modal ──────────────────────────────────────────────────── -->
<div id="confirm-modal" class="modal-veil hidden">
  <div class="modal-card">
    <p class="modal-message" id="confirm-message">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- ─── Login screen ──────────────────────────────────────────────────── -->
<section id="login-screen" class="screen">
  <form id="login-form" class="login-card" autocomplete="off">
    <div class="vinyl" aria-hidden="true"><span class="vinyl-grooves"></span><span class="vinyl-label"></span></div>
    <div class="login-eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1 class="wordmark wordmark-lg">MUSICBOT<span>console</span></h1>
    <p class="login-sub">Enter the dashboard password to connect.</p>
    <label class="field">
      <span class="field-label">password</span>
      <input type="password" id="password-input" name="password" placeholder="••••••••••" required>
    </label>
    <button type="submit" class="btn btn-primary btn-block" id="login-btn"><span>Connect</span><span class="btn-arrow">→</span></button>
    <p class="login-error" id="login-error" role="alert"></p>
  </form>
</section>

<!-- ─── Dashboard ─────────────────────────────────────────────────────── -->
<div id="dashboard" class="screen hidden">

  <header class="master">
    <div class="master-brand">
      <span class="led-wrap"><span class="led" id="online-led"></span><span class="led-ring" id="online-ring"></span></span>
      <h1 class="wordmark">MUSICBOT<span>console</span></h1>
    </div>
    <div class="master-stats" id="master-stats">
      <div class="stat">
        <span class="stat-label">ping</span>
        <span class="stat-value" id="stat-ping">—</span>
        <span class="signal-bars" id="signal-bars"><i></i><i></i><i></i><i></i></span>
      </div>
      <div class="stat"><span class="stat-label">guilds</span><span class="stat-value" id="stat-guilds">—</span></div>
      <div class="stat"><span class="stat-label">live</span><span class="stat-value" id="stat-live">—</span></div>
      <div class="stat"><span class="stat-label">uptime</span><span class="stat-value" id="stat-uptime">—</span></div>
    </div>
    <button class="btn btn-ghost" id="logout-btn">Sign out</button>
  </header>

  <!-- ─── Spotlight — the loudest room in the house ─────────────────────── -->
  <section id="spotlight" class="spotlight hidden">
    <div class="spotlight-glow" id="spotlight-glow" aria-hidden="true"></div>
    <div class="spotlight-tag">◆ on air now</div>
    <div class="spotlight-body">
      <div class="spotlight-art-wrap">
        <img class="spotlight-art" id="spotlight-art" alt="">
        <canvas id="spotlight-viz" class="spotlight-viz" width="220" height="220" aria-hidden="true"></canvas>
      </div>
      <div class="spotlight-info">
        <div class="spotlight-guild" id="spotlight-guild">—</div>
        <div class="spotlight-title" id="spotlight-title">Nothing playing</div>
        <div class="spotlight-meta">
          <span id="spotlight-author"></span>
          <span class="dot">·</span>
          <span id="spotlight-source"></span>
          <span class="dot">·</span>
          <span id="spotlight-requester"></span>
        </div>
        <div class="progress-row spotlight-progress">
          <span class="progress-time progress-elapsed" id="spotlight-elapsed">0:00</span>
          <div class="progress-track"><div class="progress-fill" id="spotlight-fill"></div></div>
          <span class="progress-time progress-duration" id="spotlight-duration">0:00</span>
        </div>
      </div>
    </div>
  </section>

  <main id="channels" class="channels"></main>

  <section id="empty-state" class="empty-state hidden">
    <div class="empty-stripe" aria-hidden="true"></div>
    <h2>ALL CHANNELS QUIET</h2>
    <p>Nothing is playing right now. Queue something with <code>/play</code> in Discord and it'll show up here.</p>
  </section>

</div>

<!-- ─── Channel strip template ────────────────────────────────────────── -->
<template id="channel-template">
  <article class="channel" data-guild-id="">
    <div class="channel-accent" aria-hidden="true"></div>
    <div class="channel-head">
      <span class="channel-tag"></span>
      <span class="channel-name"></span>
      <span class="channel-listeners"></span>
      <span class="channel-pill"></span>
    </div>

    <div class="channel-body">
      <div class="artwork-wrap">
        <img class="artwork" alt="" width="72" height="72">
      </div>
      <div class="track-info">
        <div class="track-title"></div>
        <div class="track-meta">
          <span class="track-author"></span>
          <span class="track-source"></span>
          <span class="track-requester"></span>
        </div>
        <div class="progress-row">
          <span class="progress-time progress-elapsed">0:00</span>
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <span class="progress-time progress-duration">0:00</span>
        </div>
      </div>
      <div class="vu-meter" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="channel-controls">
      <div class="transport">
        <button class="btn btn-icon act-playpause" title="Play / Pause">⏸</button>
        <button class="btn btn-icon act-skip" title="Skip">⏭</button>
        <button class="btn btn-icon act-shuffle" title="Shuffle queue">🔀</button>
        <button class="btn btn-icon act-stop" title="Stop &amp; clear queue">⏹</button>
        <button class="btn btn-icon act-disconnect" title="Disconnect">⏏</button>
      </div>

      <div class="fader-group">
        <span class="fader-label">vol</span>
        <input type="range" class="fader act-volume" min="0" max="100" value="100">
        <span class="fader-value">100</span>
      </div>

      <div class="loop-toggle" role="group" aria-label="Loop mode">
        <button class="btn btn-toggle act-loop" data-mode="off">off</button>
        <button class="btn btn-toggle act-loop" data-mode="track">track</button>
        <button class="btn btn-toggle act-loop" data-mode="queue">queue</button>
      </div>
    </div>

    <div class="search-box">
      <div class="search-input-row">
        <input type="text" class="search-input" placeholder="Search a song, or paste a link…" autocomplete="off">
        <button class="btn btn-icon act-search" title="Search">🔍</button>
      </div>
      <ul class="search-results hidden"></ul>
    </div>

    <details class="queue-disclosure">
      <summary>Up next — <span class="queue-count">0</span></summary>
      <ol class="queue-list"></ol>
    </details>
  </article>
</template>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
