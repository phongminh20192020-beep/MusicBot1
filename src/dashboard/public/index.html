<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NoName's Bot · Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%236c63ff'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='11' fill='white'%3ENN%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- ── Toasts ──────────────────────────────────────────── -->
<div id="toast-stack" class="toast-stack" aria-live="polite"></div>

<!-- ── Confirm modal ───────────────────────────────────── -->
<div id="confirm-modal" class="modal-veil hidden">
  <div class="modal-card">
    <p class="modal-message" id="confirm-message">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- ── Login ────────────────────────────────────────────── -->
<section id="login-screen" class="login-screen">
  <form id="login-form" class="login-card" autocomplete="off">
    <div class="login-logo">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#6c63ff"/><path d="M9 10.5a1 1 0 0 1 1-1h3v9h-3a1 1 0 0 1-1-1v-7zm6 0h3a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-3v-9z" fill="white"/></svg>
      <span>NoName's Bot</span>
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to control your music bot</p>
    <input type="password" id="password-input" name="password" placeholder="Enter password" required>
    <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign in</button>
    <p class="login-error" id="login-error" role="alert"></p>
  </form>
</section>

<!-- ── App shell ─────────────────────────────────────────── -->
<div id="dashboard" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#6c63ff"/><path d="M9 10.5a1 1 0 0 1 1-1h3v9h-3a1 1 0 0 1-1-1v-7zm6 0h3a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-3v-9z" fill="white"/></svg>
      <span class="brand-name">NoName's Bot</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" href="#" data-view="home">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Home
      </a>
      <a class="nav-item" href="#" data-view="queue">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h12v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        Queue
      </a>
      <a class="nav-item" href="#" data-view="history">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
        History
      </a>
    </nav>

    <div class="sidebar-status">
      <div class="status-row">
        <span class="online-dot" id="online-led"></span>
        <span class="online-ring" id="online-ring"></span>
        <span class="status-label" id="status-label">Offline</span>
      </div>
      <div class="stat-grid">
        <div class="sg-item"><span id="stat-ping" class="sg-val">—</span><span class="sg-key">Ping</span></div>
        <div class="sg-item"><span id="stat-guilds" class="sg-val">—</span><span class="sg-key">Servers</span></div>
        <div class="sg-item"><span id="stat-live" class="sg-val">—</span><span class="sg-key">Playing</span></div>
        <div class="sg-item"><span id="stat-uptime" class="sg-val">—</span><span class="sg-key">Uptime</span></div>
      </div>
    </div>

    <button class="btn btn-ghost sidebar-logout" id="logout-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      Sign out
    </button>
  </aside>

  <!-- Main -->
  <div class="main-wrap">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input id="global-search" type="text" placeholder="Search songs or artists…" autocomplete="off">
      </div>
    </header>

    <!-- Content -->
    <main class="content" id="content">

      <!-- Spotlight / Now playing hero -->
      <section id="spotlight" class="spotlight hidden">
        <div class="spotlight-bg" id="spotlight-bg"></div>
        <div class="spotlight-body">
          <div class="spotlight-art-wrap">
            <img class="spotlight-art" id="spotlight-art" alt="">
            <canvas id="spotlight-viz" class="spotlight-viz" width="180" height="180" aria-hidden="true"></canvas>
          </div>
          <div class="spotlight-info">
            <div class="spotlight-live">
              <span class="live-pill">● LIVE</span>
              <span id="spotlight-guild"></span>
            </div>
            <h2 class="spotlight-title" id="spotlight-title">Nothing playing</h2>
            <p class="spotlight-sub" id="spotlight-author"></p>
            <div class="prog-row">
              <span class="prog-t" id="spotlight-elapsed">0:00</span>
              <div class="prog-track"><div class="prog-fill" id="spotlight-fill"></div></div>
              <span class="prog-t" id="spotlight-duration">0:00</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Section heading -->
      <div class="section-head" id="section-head">
        <h2 class="section-title">Active Servers</h2>
      </div>

      <!-- Channel cards -->
      <div id="channels" class="cards-grid"></div>

      <!-- Empty -->
      <section id="empty-state" class="empty-state hidden">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <h3>Nothing playing right now</h3>
        <p>Use <code>/play</code> in Discord to start music — it'll show up here.</p>
      </section>

    </main>
  </div>
</div>

<!-- Channel card template -->
<template id="channel-template">
  <article class="channel-card" data-guild-id="">

    <!-- Art / album cover -->
    <div class="cc-art-wrap">
      <img class="cc-art" alt="" width="200" height="200">
      <div class="cc-art-overlay">
        <button class="cc-play-btn act-playpause" title="Play / Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>
        </button>
      </div>
      <div class="cc-eq" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Info below art -->
    <div class="cc-info">
      <div class="cc-track-title"></div>
      <div class="cc-track-author"></div>
      <div class="cc-guild-row">
        <span class="cc-guild-name"></span>
        <span class="cc-badge"></span>
      </div>
    </div>

    <!-- Progress -->
    <div class="prog-row cc-prog">
      <span class="prog-t prog-elapsed">0:00</span>
      <div class="prog-track"><div class="prog-fill"></div></div>
      <span class="prog-t prog-duration">0:00</span>
    </div>

    <!-- Expanded controls (revealed on hover/focus) -->
    <div class="cc-controls">
      <div class="cc-transport">
        <button class="cc-btn act-shuffle" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="cc-btn act-skip" title="Skip">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="cc-btn cc-btn-danger act-stop" title="Stop">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
        </button>
        <button class="cc-btn cc-btn-danger act-disconnect" title="Disconnect">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18z"/></svg>
        </button>
      </div>

      <div class="cc-secondary">
        <div class="vol-wrap">
          <svg viewBox="0 0 24 24" fill="currentColor" class="vol-ico"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" class="vol-slider act-volume" min="0" max="100" value="100">
          <span class="vol-val">100</span>
        </div>
        <div class="loop-wrap">
          <button class="loop-btn act-loop" data-mode="off">Off</button>
          <button class="loop-btn act-loop" data-mode="track">Track</button>
          <button class="loop-btn act-loop" data-mode="queue">Queue</button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="cc-search">
      <div class="cc-search-bar">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-input" placeholder="Add to queue…" autocomplete="off">
        <button class="act-search cc-search-go">Go</button>
      </div>
      <ul class="search-results hidden"></ul>
    </div>

    <!-- Queue toggle -->
    <details class="cc-queue-wrap">
      <summary class="cc-queue-toggle">
        Up next <span class="queue-count">0</span>
      </summary>
      <ol class="queue-list"></ol>
    </details>

  </article>
</template>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
