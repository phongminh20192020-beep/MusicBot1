<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NoName's Bot · Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%236c63ff'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='18' fill='white'%3ENN%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="noise" aria-hidden="true"></div>

<!-- Toasts -->
<div id="toast-stack" class="toast-stack" aria-live="polite"></div>

<!-- Confirm modal -->
<div id="confirm-modal" class="modal-veil hidden">
  <div class="modal-card">
    <p class="modal-message" id="confirm-message">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- Login -->
<section id="login-screen" class="screen">
  <div class="login-bg-orb orb-a"></div>
  <div class="login-bg-orb orb-b"></div>
  <form id="login-form" class="login-card" autocomplete="off">
    <div class="login-logo">
      <span class="logo-mark">NoName's Bot</span>
    </div>
    <div class="login-eq" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <h1 class="login-title">Dashboard</h1>
    <p class="login-sub">Enter your password to continue</p>
    <div class="field">
      <input type="password" id="password-input" name="password" placeholder="Password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="login-btn">Sign in</button>
    <p class="login-error" id="login-error" role="alert"></p>
  </form>
</section>

<!-- Dashboard -->
<div id="dashboard" class="screen hidden">

  <header class="topbar">
    <div class="topbar-brand">
      <span class="logo-mark logo-sm">NoName's Bot</span>
      <div class="online-dot-wrap">
        <span class="online-dot" id="online-led"></span>
        <span class="online-ring" id="online-ring"></span>
      </div>
    </div>
    <nav class="topbar-stats" id="master-stats">
      <div class="tstat"><span class="tstat-val" id="stat-ping">—</span><span class="tstat-key">ping</span></div>
      <div class="tstat"><span class="tstat-val" id="stat-guilds">—</span><span class="tstat-key">servers</span></div>
      <div class="tstat"><span class="tstat-val" id="stat-live">—</span><span class="tstat-key">playing</span></div>
      <div class="tstat"><span class="tstat-val" id="stat-uptime">—</span><span class="tstat-key">uptime</span></div>
    </nav>
    <button class="btn btn-ghost topbar-logout" id="logout-btn">Sign out</button>
  </header>

  <!-- Spotlight -->
  <section id="spotlight" class="spotlight hidden">
    <div class="spotlight-bg" id="spotlight-bg" aria-hidden="true"></div>
    <div class="spotlight-inner">
      <div class="spotlight-art-wrap">
        <img class="spotlight-art" id="spotlight-art" alt="">
        <canvas id="spotlight-viz" class="spotlight-viz" width="200" height="200" aria-hidden="true"></canvas>
      </div>
      <div class="spotlight-info">
        <p class="spotlight-eyebrow">
          <span class="live-dot" aria-hidden="true"></span>
          <span id="spotlight-guild">—</span>
        </p>
        <h2 class="spotlight-title" id="spotlight-title">Nothing playing</h2>
        <p class="spotlight-meta">
          <span id="spotlight-author"></span>
          <span class="sep">·</span>
          <span id="spotlight-source"></span>
          <span class="sep">·</span>
          <span id="spotlight-requester"></span>
        </p>
        <div class="prog-row">
          <span class="prog-t" id="spotlight-elapsed">0:00</span>
          <div class="prog-track"><div class="prog-fill" id="spotlight-fill"></div></div>
          <span class="prog-t" id="spotlight-duration">0:00</span>
        </div>
      </div>
    </div>
  </section>

  <main id="channels" class="channels"></main>

  <section id="empty-state" class="empty-state hidden">
    <div class="empty-icon">🎵</div>
    <h2>Nothing playing</h2>
    <p>Start a song in Discord with <code>/play</code> and it'll appear here.</p>
  </section>

</div>

<!-- Channel card template -->
<template id="channel-template">
  <article class="card" data-guild-id="">
    <div class="card-status-bar"></div>

    <!-- Header row -->
    <div class="card-header">
      <div class="card-guild">
        <span class="card-guild-name"></span>
        <span class="card-location"></span>
      </div>
      <span class="card-badge"></span>
    </div>

    <!-- Player body -->
    <div class="card-player">
      <div class="card-art-wrap">
        <img class="card-art" alt="" width="80" height="80">
        <div class="card-art-bars" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="card-track">
        <div class="card-track-title"></div>
        <div class="card-track-meta">
          <span class="meta-author"></span>
          <span class="meta-sep">·</span>
          <span class="meta-source"></span>
        </div>
        <div class="prog-row card-prog">
          <span class="prog-t prog-elapsed">0:00</span>
          <div class="prog-track"><div class="prog-fill"></div></div>
          <span class="prog-t prog-duration">0:00</span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="card-controls">
      <div class="ctrl-transport">
        <button class="ctrl-btn act-playpause" title="Play / Pause"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg></button>
        <button class="ctrl-btn act-skip" title="Skip"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        <button class="ctrl-btn act-shuffle" title="Shuffle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
        <button class="ctrl-btn ctrl-btn-sm act-stop" title="Stop"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg></button>
        <button class="ctrl-btn ctrl-btn-sm act-disconnect" title="Disconnect"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/></svg></button>
      </div>

      <div class="ctrl-secondary">
        <div class="vol-group">
          <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
          <input type="range" class="vol-slider act-volume" min="0" max="100" value="100">
          <span class="vol-val">100</span>
        </div>

        <div class="loop-group" role="group">
          <button class="loop-btn act-loop" data-mode="off">Off</button>
          <button class="loop-btn act-loop" data-mode="track">Track</button>
          <button class="loop-btn act-loop" data-mode="queue">Queue</button>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-panel">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-input" placeholder="Search songs, artists, or paste a link…" autocomplete="off">
        <button class="btn btn-icon act-search" title="Search">Search</button>
      </div>
      <ul class="search-results hidden"></ul>
    </div>

    <!-- Queue -->
    <details class="queue-wrap">
      <summary class="queue-toggle">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h12v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        Queue <span class="queue-count">0</span>
      </summary>
      <ol class="queue-list"></ol>
    </details>
  </article>
</template>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
